---
# Optional: ServiceMonitor so Prometheus scrapes Django metrics
# (requires django-prometheus pip package added to requirements.txt)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: django-blog-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: django-blog
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
