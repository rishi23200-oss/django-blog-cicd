name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted   # Uses your self-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in deployment
        run: |
          sed -i "s|YOUR_DOCKERHUB_USERNAME/django-blog:latest|${{ secrets.DOCKERHUB_USERNAME }}/django-blog:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/django-blog --timeout=120s

      - name: Run migrations
        run: |
          kubectl exec deployment/django-blog -- python manage.py migrate --noinput

      - name: Verify deployment
        run: |
          kubectl get pods -l app=django-blog