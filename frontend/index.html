<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Django Blog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: #1a1a2e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; }
    header div { display: flex; gap: 0.8rem; align-items: center; }

    .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h2 { margin-bottom: 0.5rem; color: #1a1a2e; }
    .card .meta { font-size: 0.83rem; color: #888; margin-bottom: 0.7rem; }
    .card p { line-height: 1.6; }

    .comments-toggle {
      margin-top: 1rem;
      background: none;
      border: 1px solid #ccc;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .comments-toggle:hover { background: #f0f0f0; }

    .comments-section { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid #eee; }
    .comment { background: #f9f9f9; border-radius: 6px; padding: 0.6rem 0.9rem; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .comment .cmeta { font-size: 0.78rem; color: #999; }

    input, textarea {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    button.btn {
      margin-top: 0.8rem;
      padding: 0.6rem 1.4rem;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.btn:hover { background: #16213e; }
    button.btn.danger { background: #c0392b; }

    #auth-section label { font-weight: 600; display: block; margin-top: 0.8rem; }
    #msg { padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
    #msg.success { background: #d4edda; color: #155724; display: block; }
    #msg.error { background: #f8d7da; color: #721c24; display: block; }

    #new-post-section h2 { margin-bottom: 1rem; }
    #posts-section h2 { margin-bottom: 1rem; }

    .spinner { text-align: center; padding: 2rem; color: #888; }
  </style>
</head>
<body>

<header>
  <h1>📝 Django Blog</h1>
  <div>
    <span id="user-label"></span>
    <button class="btn" id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <div id="msg"></div>

  <!-- Auth Section -->
  <div class="card" id="auth-section">
    <h2>Login</h2>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username"/>
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
    <button class="btn" onclick="login()">Login</button>
  </div>

  <!-- New Post Section (visible only when logged in) -->
  <div class="card" id="new-post-section" style="display:none">
    <h2>Create New Post</h2>
    <input type="text" id="post-title" placeholder="Post title"/>
    <textarea id="post-content" rows="4" placeholder="Write your post..."></textarea>
    <button class="btn" onclick="createPost()">Publish Post</button>
  </div>

  <!-- Posts List -->
  <div id="posts-section">
    <h2 style="margin-bottom:1rem">Latest Posts</h2>
    <div id="posts-container"><div class="spinner">Loading posts...</div></div>
  </div>
</div>

<script>
  // ──────────────────────────────────────────────
  // CONFIG — change this to your backend URL
  // ──────────────────────────────────────────────
  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost'
    : 'https://YOUR_AWS_BACKEND_DOMAIN';  // Replace before deploying to Netlify

  let accessToken = localStorage.getItem('access_token') || null;
  let currentUser = localStorage.getItem('username') || null;

  // ── Helpers ──────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = type;
    setTimeout(() => { el.className = ''; el.style.display = 'none'; }, 3500);
  }

  function updateAuthUI() {
    const authSection = document.getElementById('auth-section');
    const newPostSection = document.getElementById('new-post-section');
    const logoutBtn = document.getElementById('logout-btn');
    const userLabel = document.getElementById('user-label');
    if (accessToken) {
      authSection.style.display = 'none';
      newPostSection.style.display = 'block';
      logoutBtn.style.display = 'inline-block';
      userLabel.textContent = `👤 ${currentUser}`;
    } else {
      authSection.style.display = 'block';
      newPostSection.style.display = 'none';
      logoutBtn.style.display = 'none';
      userLabel.textContent = '';
    }
  }

  // ── Auth ─────────────────────────────────────
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) { showMsg('Enter username and password', 'error'); return; }

    try {
      const res = await fetch(`${API_BASE}/api/token/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) { showMsg('Invalid credentials', 'error'); return; }
      const data = await res.json();
      accessToken = data.access;
      currentUser = username;
      localStorage.setItem('access_token', accessToken);
      localStorage.setItem('username', username);
      updateAuthUI();
      showMsg('Logged in successfully!', 'success');
      loadPosts();
    } catch (e) {
      showMsg('Connection error', 'error');
    }
  }

  function logout() {
    accessToken = null;
    currentUser = null;
    localStorage.removeItem('access_token');
    localStorage.removeItem('username');
    updateAuthUI();
    showMsg('Logged out.', 'success');
  }

  // ── Posts ────────────────────────────────────
  async function loadPosts() {
    const container = document.getElementById('posts-container');
    container.innerHTML = '<div class="spinner">Loading posts...</div>';
    try {
      const res = await fetch(`${API_BASE}/posts/`);
      const posts = await res.json();
      if (!posts.length) { container.innerHTML = '<p style="color:#888">No posts yet. Be the first!</p>'; return; }
      container.innerHTML = '';
      posts.forEach(post => {
        container.appendChild(buildPostCard(post));
      });
    } catch (e) {
      container.innerHTML = '<p style="color:red">Failed to load posts.</p>';
    }
  }

  function buildPostCard(post) {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `post-${post.id}`;
    card.innerHTML = `
      <h2>${escHtml(post.title)}</h2>
      <div class="meta">By <strong>${escHtml(post.author_username)}</strong> · ${formatDate(post.created_at)} · ${post.comment_count} comment(s)</div>
      <p>${escHtml(post.content)}</p>
      <button class="comments-toggle" onclick="toggleComments(${post.id}, this)">💬 Show Comments</button>
      <div class="comments-section" id="comments-${post.id}" style="display:none"></div>
    `;
    return card;
  }

  async function createPost() {
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    if (!title || !content) { showMsg('Fill in title and content', 'error'); return; }

    try {
      const res = await fetch(`${API_BASE}/posts/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ title, content })
      });
      if (res.status === 401) { showMsg('Session expired. Please login again.', 'error'); logout(); return; }
      if (!res.ok) { showMsg('Failed to create post', 'error'); return; }
      document.getElementById('post-title').value = '';
      document.getElementById('post-content').value = '';
      showMsg('Post published!', 'success');
      loadPosts();
    } catch (e) {
      showMsg('Connection error', 'error');
    }
  }

  // ── Comments ─────────────────────────────────
  async function toggleComments(postId, btn) {
    const section = document.getElementById(`comments-${postId}`);
    if (section.style.display === 'none') {
      section.style.display = 'block';
      btn.textContent = '🔼 Hide Comments';
      await loadComments(postId, section);
    } else {
      section.style.display = 'none';
      btn.textContent = '💬 Show Comments';
    }
  }

  async function loadComments(postId, container) {
    container.innerHTML = '<em>Loading...</em>';
    try {
      const res = await fetch(`${API_BASE}/posts/${postId}/comments/`);
      const comments = await res.json();
      container.innerHTML = '';
      if (!comments.length) {
        container.innerHTML = '<p style="color:#aaa;font-size:0.85rem">No comments yet.</p>';
      } else {
        comments.forEach(c => {
          const div = document.createElement('div');
          div.className = 'comment';
          div.innerHTML = `<div class="cmeta">${escHtml(c.author_username)} · ${formatDate(c.created_at)}</div>${escHtml(c.content)}`;
          container.appendChild(div);
        });
      }
      if (accessToken) {
        const addDiv = document.createElement('div');
        addDiv.style.marginTop = '0.8rem';
        addDiv.innerHTML = `
          <textarea id="comment-input-${postId}" rows="2" placeholder="Write a comment..." style="margin-top:0"></textarea>
          <button class="btn" style="margin-top:0.5rem;font-size:0.85rem" onclick="addComment(${postId})">Post Comment</button>
        `;
        container.appendChild(addDiv);
      }
    } catch (e) {
      container.innerHTML = '<p style="color:red">Failed to load comments.</p>';
    }
  }

  async function addComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const content = input.value.trim();
    if (!content) { showMsg('Comment cannot be empty', 'error'); return; }

    try {
      const res = await fetch(`${API_BASE}/posts/${postId}/comments/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ content })
      });
      if (!res.ok) { showMsg('Failed to post comment', 'error'); return; }
      input.value = '';
      showMsg('Comment added!', 'success');
      const section = document.getElementById(`comments-${postId}`);
      await loadComments(postId, section);
    } catch (e) {
      showMsg('Connection error', 'error');
    }
  }

  // ── Utils ────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  // ── Init ─────────────────────────────────────
  updateAuthUI();
  loadPosts();
</script>

</body>
</html>
